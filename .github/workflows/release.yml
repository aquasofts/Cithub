name: Build and publish APKs

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"
      - "[0-9]*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-version tag to build (for example V2.1.30)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Full and Lite release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Validate version and signing secrets
        id: version
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          case "$tag" in
            v*|V*) version="${tag:1}" ;;
            *) version="$tag" ;;
          esac

          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag must be a semantic version such as V2.1.29, v2.1.29, or 2.1.29." >&2
            exit 1
          fi

          history_version="$(sed -n 's/^- Version name: `\([^`]*\)`.*/\1/p' VERSION_HISTORY.md | head -n 1)"
          history_code="$(sed -n 's/^- Version code: `\([0-9][0-9]*\)`.*/\1/p' VERSION_HISTORY.md | head -n 1)"
          gradle_version="$(sed -n 's/.*versionName = ciVersionName ?: "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          gradle_code="$(sed -n 's/.*versionCode = ciVersionCode ?: \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"

          if [[ -z "$history_version" || -z "$history_code" || -z "$gradle_version" || -z "$gradle_code" ]]; then
            echo "Could not read the current version from VERSION_HISTORY.md and app/build.gradle.kts." >&2
            exit 1
          fi
          if [[ "$version" != "$history_version" || "$version" != "$gradle_version" ]]; then
            echo "Tag version $version does not match VERSION_HISTORY.md ($history_version) and app/build.gradle.kts ($gradle_version)." >&2
            exit 1
          fi
          if [[ "$history_code" != "$gradle_code" ]]; then
            echo "versionCode mismatch: VERSION_HISTORY.md has $history_code but app/build.gradle.kts has $gradle_code." >&2
            exit 1
          fi

          if [[ -z "$KEYSTORE_BASE64" || -z "$ANDROID_SIGNING_STORE_PASSWORD" || -z "$ANDROID_SIGNING_KEY_ALIAS" || -z "$ANDROID_SIGNING_KEY_PASSWORD" ]]; then
            echo "Configure all four Android signing secrets before running this workflow." >&2
            exit 1
          fi

          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > "$ANDROID_SIGNING_STORE_FILE"
          chmod 600 "$ANDROID_SIGNING_STORE_FILE"
          keytool -list \
            -keystore "$ANDROID_SIGNING_STORE_FILE" \
            -storepass "$ANDROID_SIGNING_STORE_PASSWORD" \
            -alias "$ANDROID_SIGNING_KEY_ALIAS" \
            >/dev/null

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$version" >> "$GITHUB_OUTPUT"
          echo "code=$gradle_code" >> "$GITHUB_OUTPUT"

      - name: Run unit and Retrofit smoke tests
        run: >-
          ./gradlew
          :feature:tieba:testDebugUnitTest
          :feature:home:testDebugUnitTest
          :core:webvpn:testDebugUnitTest
          :core:academic:testDebugUnitTest
          --stacktrace
          --no-daemon

      - name: Build minified release APKs
        run: >-
          ./gradlew
          :app:assembleAutoCaptchaRelease
          :app:assembleManualCaptchaRelease
          -PciVersionName=${{ steps.version.outputs.name }}
          -PciVersionCode=${{ steps.version.outputs.code }}
          --stacktrace
          --no-daemon

      - name: Name and verify APKs
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          set -euo pipefail

          mkdir -p release
          cp app/build/outputs/apk/autoCaptcha/release/app-autoCaptcha-release.apk "release/Full-Cithub-V${VERSION}.apk"
          cp app/build/outputs/apk/manualCaptcha/release/app-manualCaptcha-release.apk "release/Lite-Cithub-V${VERSION}.apk"

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          for apk in release/*.apk; do
            "$build_tools/apksigner" verify --verbose --print-certs "$apk"
            "$build_tools/zipalign" -c -P 16 -v 4 "$apk"
            if "$build_tools/aapt" dump badging "$apk" | grep -q "application-debuggable"; then
              echo "$apk is debuggable; refusing to publish it." >&2
              exit 1
            fi
            unzip -l "$apk" | grep -q "assets/dexopt/baseline.prof"
            unzip -l "$apk" | grep -q "assets/dexopt/baseline.profm"
          done

          (cd release && sha256sum ./*.apk > SHA256SUMS.txt)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cithub-${{ steps.version.outputs.name }}-release-APKs
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq '.id')"
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -F prerelease=true \
              -f make_latest=false \
              >/dev/null
            gh release upload "$RELEASE_TAG" release/*.apk release/SHA256SUMS.txt --clobber
          else
            gh release create "$RELEASE_TAG" \
              release/*.apk \
              release/SHA256SUMS.txt \
              --verify-tag \
              --prerelease \
              --title "Cithub ${VERSION} (Pre-release)" \
              --generate-notes
          fi
