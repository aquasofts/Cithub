name: Build and publish APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling-prerelease
  cancel-in-progress: true

jobs:
  prerelease:
    name: Build latest Full and Lite pre-release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PRERELEASE_TAG: prerelease

    steps:
      - name: Check out latest source
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Verify TiebaLite build sources
        shell: bash
        run: |
          set -euo pipefail

          proto_dir="TiebaLite/app/src/main/protos"
          helios_dir="TiebaLite/app/src/main/java/com/huanchengfly/tieba/post/utils/helios"
          proto_count="$(find "$proto_dir" -type f -name '*.proto' | wc -l)"

          if (( proto_count == 0 )); then
            echo "TiebaLite protobuf sources were not checked out." >&2
            exit 1
          fi
          if [[ ! -d "$helios_dir" ]]; then
            echo "TiebaLite Helios sources were not checked out." >&2
            exit 1
          fi

          echo "TiebaLite source check passed with $proto_count protobuf files."

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore pre-release signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: cithub-prerelease-debug-keystore-v1

      - name: Prepare pre-release signing key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.android"
          if [[ ! -f "$HOME/.android/debug.keystore" ]]; then
            keytool -genkeypair \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit and Retrofit smoke tests
        run: >-
          ./gradlew
          :feature:tieba:testDebugUnitTest
          :feature:home:testDebugUnitTest
          :core:webvpn:testDebugUnitTest
          :core:academic:testDebugUnitTest
          --stacktrace
          --no-daemon

      - name: Build latest optimized APKs
        run: >-
          ./gradlew
          :app:assembleAutoCaptchaPerformance
          :app:assembleManualCaptchaPerformance
          --stacktrace
          --no-daemon

      - name: Name and verify APKs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p prerelease
          cp app/build/outputs/apk/autoCaptcha/performance/app-autoCaptcha-performance.apk "prerelease/Full-Cithub-PreRelease.apk"
          cp app/build/outputs/apk/manualCaptcha/performance/app-manualCaptcha-performance.apk "prerelease/Lite-Cithub-PreRelease.apk"

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          for apk in prerelease/*.apk; do
            "$build_tools/apksigner" verify --verbose --print-certs "$apk"
            "$build_tools/zipalign" -c -P 16 -v 4 "$apk"
            if "$build_tools/aapt" dump badging "$apk" | grep -q "application-debuggable"; then
              echo "$apk is debuggable; refusing to publish it." >&2
              exit 1
            fi
            unzip -l "$apk" | grep -q "assets/dexopt/baseline.prof"
            unzip -l "$apk" | grep -q "assets/dexopt/baseline.profm"
          done

          (cd prerelease && sha256sum ./*.apk > SHA256SUMS.txt)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cithub-pre-release-${{ github.sha }}
          path: prerelease/
          if-no-files-found: error
          retention-days: 30

      - name: Publish rolling GitHub pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$PRERELEASE_TAG" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/git/refs/tags/$PRERELEASE_TAG" \
              -f sha="$GITHUB_SHA" \
              -F force=true \
              >/dev/null
          else
            gh api \
              --method POST \
              "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$PRERELEASE_TAG" \
              -f sha="$GITHUB_SHA" \
              >/dev/null
          fi

          release_notes="Automatically built from the latest main-branch commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          if gh release view "$PRERELEASE_TAG" >/dev/null 2>&1; then
            release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$PRERELEASE_TAG" --jq '.id')"
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -f name="Cithub Pre-release" \
              -f body="$release_notes" \
              -F draft=false \
              -F prerelease=true \
              -f make_latest=false \
              >/dev/null
            gh release upload "$PRERELEASE_TAG" prerelease/*.apk prerelease/SHA256SUMS.txt --clobber
          else
            gh release create "$PRERELEASE_TAG" \
              prerelease/*.apk \
              prerelease/SHA256SUMS.txt \
              --verify-tag \
              --prerelease \
              --title "Cithub Pre-release" \
              --notes "$release_notes"
          fi
